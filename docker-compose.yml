version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: sada-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sada_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sada-network

  # ===========================================
  # Redis Cache/Session
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sada-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sada-network

  # ===========================================
  # API Gateway
  # ===========================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: sada-gateway
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - AUTH_RATE_LIMIT_WINDOW_MS=60000
      - AUTH_RATE_LIMIT_MAX_REQUESTS=5
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - sada-network

  # ===========================================
  # Auth Service
  # ===========================================
  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    container_name: sada-auth-service
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sada_db?schema=public
      - REDIS_URL=redis://redis:6379
      - OIDC_ISSUER=http://auth-service:3001
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@menpan.go.id}
      # LDAP Configuration
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-}
      - INTERNAL_EMAIL_DOMAIN=${INTERNAL_EMAIL_DOMAIN:-menpan.go.id}
      # MySQL (tb_master_pegawai)
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-main_db}
      # SPLP Configuration
      - SPLP_CLIENT_ID=${SPLP_CLIENT_ID:-}
      - SPLP_CLIENT_SECRET=${SPLP_CLIENT_SECRET:-}
      - SPLP_AUTHORIZATION_URL=${SPLP_AUTHORIZATION_URL:-}
      - SPLP_TOKEN_URL=${SPLP_TOKEN_URL:-}
      - SPLP_USERINFO_URL=${SPLP_USERINFO_URL:-}
      - SPLP_REDIRECT_URI=${SPLP_REDIRECT_URI:-}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      # Facebook OAuth
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      - FACEBOOK_CALLBACK_URL=${FACEBOOK_CALLBACK_URL:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sada-network

  # ===========================================
  # Auth UI (SSO Frontend)
  # Nginx serves SPA static files + proxies /api/* to auth-service
  # ===========================================
  auth-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth-ui
    container_name: sada-auth-ui
    ports:
      - "3002:80"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sada-network

volumes:
  postgres_data:
  redis_data:


networks:
  sada-network:
    driver: bridge
