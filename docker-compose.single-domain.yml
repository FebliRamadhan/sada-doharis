version: '3.8'

# =============================================================================
# SADA SSO — Single Domain Stack
#
# Semua service berjalan di belakang 1 Nginx (port 80 / 443).
# Set domain di .env → DOMAIN=sso.panrb.go.id
#
# Jalankan:
#   docker compose -f docker-compose.single-domain.yml up -d
# =============================================================================

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sada-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       sada_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - sada-internal

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sada-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - sada-internal

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context:    .
      dockerfile: docker/Dockerfile.auth
    container_name: sada-auth-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AUTH_SERVICE_PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sada_db?schema=public
      - REDIS_URL=redis://redis:6379
      # OIDC_ISSUER harus URL publik domain Anda
      - OIDC_ISSUER=${DOMAIN_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET wajib diisi di .env}
      # LDAP
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-}
      - INTERNAL_EMAIL_DOMAIN=${INTERNAL_EMAIL_DOMAIN:-menpan.go.id}
      # MySQL
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-main_db}
      # SPLP
      - SPLP_CLIENT_ID=${SPLP_CLIENT_ID:-}
      - SPLP_CLIENT_SECRET=${SPLP_CLIENT_SECRET:-}
      - SPLP_AUTHORIZATION_URL=${SPLP_AUTHORIZATION_URL:-}
      - SPLP_TOKEN_URL=${SPLP_TOKEN_URL:-}
      - SPLP_USERINFO_URL=${SPLP_USERINFO_URL:-}
      - SPLP_REDIRECT_URI=${SPLP_REDIRECT_URI:-}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${DOMAIN_URL:-http://localhost}/api/auth/google/callback
      # Facebook OAuth
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      - FACEBOOK_CALLBACK_URL=${DOMAIN_URL:-http://localhost}/api/auth/facebook/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout:  10s
      retries:  3
    # Port TIDAK di-expose ke host — hanya diakses lewat Nginx
    expose:
      - "3001"
    networks:
      - sada-internal

  # ─── Auth UI + Nginx (single domain entry point) ─────────────────────────────
  nginx:
    build:
      context:    .
      dockerfile: docker/Dockerfile.auth-ui
    container_name: sada-nginx
    restart: unless-stopped
    # Override nginx config dengan versi single-domain
    volumes:
      - ./docker/nginx.single-domain.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment untuk HTTPS:
      # - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    ports:
      - "80:80"
      # - "443:443"   # Uncomment untuk HTTPS
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - sada-internal

volumes:
  postgres_data:
  redis_data:

networks:
  sada-internal:
    driver: bridge
    # Tidak di-expose ke luar — hanya komunikasi antar container
