version: '3.8'

# ===========================================
# SADA API - Production Docker Compose
# ===========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Environment: Requires .env.prod file with all secrets
# ===========================================

services:
  # ===========================================
  # PostgreSQL Database (Production)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: sada-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sada_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - sada-prod-network

  # ===========================================
  # Redis Cache (Production)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sada-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - sada-prod-network

  # ===========================================
  # API Gateway (Production)
  # ===========================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
      args:
        NODE_ENV: production
    image: sada/gateway:${VERSION:-latest}
    container_name: sada-gateway-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - sada-prod-network

  # ===========================================
  # Auth Service (Production)
  # ===========================================
  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
      args:
        NODE_ENV: production
    image: sada/auth-service:${VERSION:-latest}
    container_name: sada-auth-service-prod
    restart: always
    environment:
      - NODE_ENV=production
      - AUTH_SERVICE_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sada_db}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OIDC_ISSUER=${OIDC_ISSUER}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRES_IN=${JWT_ACCESS_TOKEN_EXPIRES_IN:-15m}
      - JWT_REFRESH_TOKEN_EXPIRES_IN=${JWT_REFRESH_TOKEN_EXPIRES_IN:-7d}
      # SSO Session Cookie
      - SESSION_COOKIE_SECRET=${SESSION_COOKIE_SECRET}
      - SESSION_TTL=${SESSION_TTL:-7d}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - INTERNAL_EMAIL_DOMAIN=${INTERNAL_EMAIL_DOMAIN:-menpan.go.id}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # MySQL (tb_master_pegawai)
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-main_db}
      # LDAP Configuration
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-}
      # SPLP Configuration
      - SPLP_CLIENT_ID=${SPLP_CLIENT_ID:-}
      - SPLP_CLIENT_SECRET=${SPLP_CLIENT_SECRET:-}
      - SPLP_AUTHORIZATION_URL=${SPLP_AUTHORIZATION_URL:-}
      - SPLP_TOKEN_URL=${SPLP_TOKEN_URL:-}
      - SPLP_USERINFO_URL=${SPLP_USERINFO_URL:-}
      - SPLP_REDIRECT_URI=${SPLP_REDIRECT_URI:-}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      # Facebook OAuth
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      - FACEBOOK_CALLBACK_URL=${FACEBOOK_CALLBACK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - sada-prod-network

  # ===========================================
  # Auth UI (Production)
  # Nginx serves SPA + proxies /api/* → auth-service via nginx.single-domain.conf
  # ===========================================
  auth-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth-ui
    image: sada/auth-ui:${VERSION:-latest}
    container_name: sada-auth-ui-prod
    restart: always
    ports:
      - "${AUTH_UI_PORT:-3002}:80"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - sada-prod-network

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  sada-prod-network:
    driver: bridge
