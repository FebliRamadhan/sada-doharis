# =============================================================================
# SADA SSO — Single Domain Nginx Configuration
#
# SSL di-terminate oleh Load Balancer.
# Nginx hanya mendengarkan HTTP (port 80) dari LB.
#
# LB → HTTP → Nginx (port 80) → auth-service / auth-ui
#
# Routing:
#   /                   → Auth UI  (SPA)
#   /api/               → Auth Service
#   /oauth/             → Auth Service  (OIDC endpoints publik)
#   /.well-known/       → Auth Service  (OIDC discovery & JWKS)
#   /health             → Auth Service  (health check)
# =============================================================================

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

upstream auth_service {
    server auth-service:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Real IP dari LB ───────────────────────────────────────────────────────
    # Percayai X-Forwarded-For yang dikirim LB agar rate limit & log akurat.
    # Ganti 10.0.0.0/8 dengan subnet LB Anda.
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript
                    text/javascript application/xml text/xml image/svg+xml;

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Proxy helper ──────────────────────────────────────────────────────────
    # X-Forwarded-Proto diteruskan dari LB sehingga auth-service
    # tahu bahwa request aslinya HTTPS meski Nginx terima HTTP.
    proxy_http_version 1.1;
    proxy_set_header   Connection      "";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

    # ── /api/auth/login|register — rate limited ───────────────────────────────
    location ~ ^/api/auth/(login|ldap/login|register) {
        limit_req        zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://auth_service;
        proxy_read_timeout 15s;
    }

    # ── /api/* → auth-service ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://auth_service/;
        proxy_read_timeout 30s;
    }

    # ── /oauth/* → auth-service (OIDC publik) ────────────────────────────────
    location /oauth/ {
        proxy_pass http://auth_service/oauth/;
    }

    # ── /.well-known/* → auth-service (discovery & JWKS) ─────────────────────
    location /.well-known/ {
        proxy_pass http://auth_service/.well-known/;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── /health ───────────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://auth_service/health;
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
