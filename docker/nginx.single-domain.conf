# =============================================================================
# SADA SSO — Single Domain Nginx Configuration
#
# Semua service dijangkau lewat 1 domain (mis. sso.panrb.go.id):
#
#   /                       → Auth UI  (SPA)
#   /api/                   → Auth Service  (internal proxy)
#   /oauth/                 → Auth Service  (OIDC endpoints publik)
#   /.well-known/           → Auth Service  (OIDC discovery & JWKS)
#   /health                 → Auth Service  (health check)
#
# Untuk HTTPS, uncomment blok SSL di bawah dan
# ganti /etc/nginx/ssl/ dengan path sertifikat Anda.
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

upstream auth_service {
    server auth-service:3001;
    keepalive 32;
}

# ─── HTTP (port 80) ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;                  # Ganti dengan domain Anda, mis: sso.panrb.go.id

    # Uncomment baris berikut jika HTTPS aktif:
    # return 301 https://$host$request_uri;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Keamanan ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript
                    text/javascript application/xml text/xml image/svg+xml;

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Auth Service: login & register (rate limited) ─────────────────────────
    location ~ ^/api/auth/(login|ldap/login|register) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Strip prefix /api → /
        rewrite ^/api/(.*)$ /$1 break;
    }

    # ── Auth Service: semua /api/* ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://auth_service/;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── OIDC: /oauth/* (token, introspect, userinfo, logout, revoke) ──────────
    # Diakses langsung oleh aplikasi klien (bukan lewat /api)
    location /oauth/ {
        proxy_pass         http://auth_service/oauth/;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── OIDC Discovery & JWKS ────────────────────────────────────────────────
    # https://sso.domain.com/.well-known/openid-configuration
    # https://sso.domain.com/.well-known/jwks.json
    location /.well-known/ {
        proxy_pass         http://auth_service/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache 1 jam (JWKS dan discovery jarang berubah)
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://auth_service/health;
        access_log off;
    }

    # ── SPA fallback (semua route unknown → index.html) ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

